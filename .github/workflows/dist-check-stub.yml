# Dist Check — BOOTSTRAP STUB (temporary; verifies nothing)
#
# The `Main protection` and `Release protection` rulesets require a passing
# `Dist Check` status (GitHub Actions, app id 15368). The REAL check lives in
# .github/workflows/dist-check.yml (#59) and ships with 0.3.0 — it is NOT yet on
# main. Any branch whose head predates the real workflow therefore can never
# report the `Dist Check` context and is permanently blocked against it.
#
# This stub emits a passing `Dist Check` job so those PRs can merge. It is a
# SCAFFOLD, not a gate — it checks nothing.
#
# LIFECYCLE — REMOVE THIS FILE the moment 0.3.0 is promoted to main (tracking:
# #85). Once the real dist-check.yml lands on main, both workflows report the
# `Dist Check` context and this always-green stub would MASK a genuine failure of
# the real freshness gate.
#
# Distinct filename (NOT dist-check.yml) on purpose: sharing the real path would
# cause an add/add merge conflict when promote-release merges release/0.3.0 into
# main, breaking the automated promotion.

name: Dist Check (bootstrap stub)

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
      - 'release/**'

permissions: {}

jobs:
  dist-check:
    # Contractual context name required by the branch rulesets — must match the
    # real workflow's job name exactly (#60). Do not rename.
    name: Dist Check
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Bootstrap stub — verifies nothing
        run: |
          echo "Bootstrap 'Dist Check' stub: satisfies the required status context on"
          echo "branches that predate the real dist-check.yml (#59, ships with 0.3.0)."
          echo "Remove this workflow once 0.3.0 is promoted to main. Tracking: #85."
